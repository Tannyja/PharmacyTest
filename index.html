<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoPharm System — ระบบจ่ายยาอัตโนมัติ</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700;9..40,800;9..40,900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      background: #f2f2ef;
      min-height: 100vh;
      padding: 24px;
      color: #111;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── Toast ── */
    #toast {
      display: none;
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: #fff;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      animation: toastIn 0.2s ease;
      white-space: nowrap;
      gap: 8px;
      align-items: center;
    }
    #toast.show { display: flex; }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .logo-wrap { display: flex; align-items: center; gap: 12px; }
    .logo-mark {
      width: 38px; height: 38px;
      background: #111; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: #fff;
      font-family: 'DM Mono', monospace;
    }
    .logo-title { font-size: 18px; font-weight: 800; color: #111; letter-spacing: -0.4px; }
    .logo-sub   { font-size: 12px; color: #aaa; font-weight: 500; }

    .stat-group { display: flex; gap: 10px; }
    .stat-box {
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 12px;
      padding: 8px 18px;
      text-align: center;
      min-width: 80px;
    }
    .stat-val { font-size: 22px; font-weight: 900; line-height: 1.1; }
    .stat-lbl { font-size: 11px; color: #aaa; font-weight: 600; }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      align-items: start;
    }

    /* ── Panel ── */
    .panel {
      background: #fff;
      border-radius: 20px;
      border: 1px solid #e8e8e4;
      padding: 22px;
      animation: fadeUp 0.3s ease both;
    }
    .panel-title {
      font-size: 13px; font-weight: 700; color: #999;
      text-transform: uppercase; letter-spacing: 0.9px;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-icon {
      width: 28px; height: 28px;
      background: #111; border-radius: 7px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .panel-badge {
      margin-left: auto;
      background: #111; color: #fff;
      border-radius: 20px; padding: 2px 8px;
      font-size: 11px; font-weight: 700;
    }

    /* ── Form ── */
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #888; margin-bottom: 5px; }
    .inp {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid #e4e4e0; border-radius: 10px;
      font-size: 14px; background: #fafaf8;
      outline: none; color: #111;
      transition: border 0.2s, background 0.2s;
      font-family: inherit;
    }
    .inp:focus { border-color: #111; background: #fff; }
    .inp::placeholder { color: #bbb; }

    .btn-black {
      background: #111; color: #fff; border: none;
      border-radius: 10px; padding: 11px 18px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit; letter-spacing: 0.2px;
      width: 100%;
    }
    .btn-black:hover  { background: #333; }
    .btn-black:active { transform: scale(0.98); }

    .btn-ghost {
      background: transparent; color: #111;
      border: 1.5px solid #ddd; border-radius: 9px;
      padding: 8px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .btn-ghost:hover    { border-color: #111; background: #f5f5f2; }
    .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-ghost.full     { width: 100%; margin-bottom: 10px; }

    /* ── Autocomplete ── */
    .sugg-wrap { position: relative; }
    .sugg {
      display: none;
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: #fff; border: 1.5px solid #e4e4e0;
      border-radius: 10px; z-index: 50; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.09);
    }
    .sugg.open { display: block; }
    .sugg-item {
      padding: 9px 13px; cursor: pointer;
      font-size: 13px; color: #333;
      border-bottom: 1px solid #f5f5f2;
    }
    .sugg-item:last-child { border-bottom: none; }
    .sugg-item:hover { background: #f8f8f5; }

    /* ── Med list ── */
    #med-list-box {
      border: 1.5px solid #e8e8e4; border-radius: 11px;
      overflow: hidden; background: #fafaf8;
      margin-bottom: 10px; display: none;
    }
    .med-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-bottom: 1px solid #f5f5f2;
    }
    .med-row:last-child { border-bottom: none; }
    .med-num {
      width: 20px; height: 20px; border-radius: 5px;
      background: #111; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; flex-shrink: 0;
    }
    .med-del {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: 14px; padding: 0 2px; line-height: 1;
    }
    .med-del:hover { color: #888; }

    /* ── History ── */
    .history-scroll { max-height: 200px; overflow-y: auto; }
    .h-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: #f8f8f5;
      border-radius: 9px; margin-bottom: 5px;
    }
    .h-name { font-size: 13px; font-weight: 600; color: #111; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .h-sub  { font-size: 11px; color: #aaa; }

    /* ── Tags ── */
    .tag { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .tag-p { background: #fff3e0; color: #c85000; }
    .tag-a { background: #e8f0fe; color: #1a56db; }
    .tag-d { background: #e6f4ea; color: #1e7e34; }

    /* ── Pharmacy cards ── */
    .rx-card {
      border: 1.5px solid #e8e8e4; border-radius: 13px;
      padding: 14px; background: #fafaf8; margin-bottom: 12px;
    }
    .rx-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .rx-name { font-size: 14px; font-weight: 700; color: #111; }
    .rx-meta { font-size: 11px; color: #aaa; margin-top: 2px; font-family: 'DM Mono', monospace; }
    .rx-meds { border: 1px solid #eeeeea; border-radius: 9px; overflow: hidden; margin-bottom: 12px; background: #fff; }
    .rx-med-row { padding: 7px 12px; border-bottom: 1px solid #f5f5f2; font-size: 12px; }
    .rx-med-row:last-child { border-bottom: none; }
    .assign-btns { display: flex; gap: 6px; }
    .assign-btns .btn-ghost { flex: 1; padding: 8px 4px; font-size: 13px; font-weight: 700; }

    .in-progress { margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0f0ec; }
    .in-progress-lbl { font-size: 11px; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px; }
    .ip-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: #f0f8ff;
      border-radius: 9px; margin-bottom: 6px;
      border: 1px solid #ddeeff;
    }

    /* ── Dot ── */
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-green  { background: #22c55e; }
    .dot-yellow { background: #f59e0b; animation: pulse 1s infinite; }

    /* ── Queue ── */
    .queue-board {
      background: #111; border-radius: 14px;
      padding: 16px; margin-bottom: 16px;
    }
    .queue-board-lbl {
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.35); letter-spacing: 1px; margin-bottom: 10px;
    }
    .queue-tickets { display: flex; gap: 10px; flex-wrap: wrap; }
    .queue-ticket {
      flex: 1; min-width: 90px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px; padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .ticket-num  { font-size: 34px; font-weight: 900; color: #fff; line-height: 1; }
    .ticket-name { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 6px; font-weight: 600; }

    .qrow { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 11px; margin-bottom: 6px; }
    .qrow.waiting { background: #f5f5f2; }
    .qrow.done    { background: #f0faf2; opacity: 0.7; }
    .q-id {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; flex-shrink: 0;
    }
    .q-id.waiting { background: #111; color: #fff; }
    .q-id.done    { background: #e8f5e9; color: #1e7e34; }
    .q-name { font-size: 13px; font-weight: 700; color: #111; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .q-sub  { font-size: 11px; color: #aaa; }
    .q-unit { font-size: 15px; font-weight: 800; }
    .q-unit.waiting { color: #111; }
    .q-unit.done    { color: #22c55e; }
    .queue-scroll { max-height: 340px; overflow-y: auto; }

    /* ── Dispenser ── */
    .disp { border-radius: 16px; padding: 20px; border: 1.5px solid #e8e8e4; transition: all 0.25s; margin-bottom: 12px; }
    .disp.idle { background: #fafaf8; }
    .disp.busy { background: #111; border-color: #111; }
    .disp-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .disp-unit-lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; }
    .disp-status { display: flex; align-items: center; gap: 6px; }
    .disp-status-txt { font-size: 10px; font-weight: 700; }
    .disp-num { font-size: 44px; font-weight: 900; line-height: 1; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
    .disp-num.idle { color: #111; }
    .disp-num.busy { color: #fff; }
    .disp-ready-txt { font-size: 12px; color: #bbb; font-weight: 500; }
    .disp-patient { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .disp-med { font-size: 11px; color: rgba(255,255,255,0.55); padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .disp-med:last-child { border-bottom: none; }
    .btn-complete {
      width: 100%; margin-top: 12px;
      background: rgba(255,255,255,0.12); color: #fff;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 9px;
      padding: 9px 0; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn-complete:hover { background: rgba(255,255,255,0.22); }

    /* ── Empty states ── */
    .empty { text-align: center; padding: 44px 0; color: #ccc; }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    .empty-txt  { font-size: 13px; font-weight: 600; color: #bbb; }

    /* ── Divider ── */
    .div { border: none; border-top: 1px solid #f0f0ec; margin: 14px 0; }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
  </style>
</head>
<body>

<!-- Toast -->
<div id="toast">
  <span id="toast-icon" style="opacity:0.5"></span>
  <span id="toast-msg"></span>
</div>

<!-- Header -->
<div id="header">
  <div class="logo-wrap">
    <div class="logo-mark">CHO</div>
    <div>
      <div class="logo-title">AutoPharm System</div>
      <div class="logo-sub">ระบบจ่ายยาอัตโนมัติ</div>
    </div>
  </div>
  <div class="stat-group">
    <div class="stat-box">
      <div class="stat-val" id="stat-total" style="color:#111">0</div>
      <div class="stat-lbl">สั่งยาแล้ว</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-pending" style="color:#c85000">0</div>
      <div class="stat-lbl">รอจ่าย</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-done" style="color:#1e7e34">0</div>
      <div class="stat-lbl">เสร็จสิ้น</div>
    </div>
  </div>
</div>

<!-- 4-Panel Grid -->
<div id="grid">

  <!-- PANEL 1: DOCTOR -->
  <div class="panel" style="animation-delay:0ms">
    <div class="panel-title">
      <span class="panel-icon">🩺</span>
      หมอ / สั่งยา
    </div>

    <div class="field">
      <label>ชื่อผู้ป่วย *</label>
      <input class="inp" id="p-name" placeholder="ชื่อ-นามสกุล" autocomplete="off" />
    </div>
    <div class="field">
      <label>เลข HN</label>
      <input class="inp" id="p-hn" placeholder="HN-XXXX" autocomplete="off" />
    </div>

    <hr class="div" />

    <div class="field sugg-wrap">
      <label>ชื่อยา</label>
      <input class="inp" id="med-input" placeholder="พิมพ์ชื่อยา..." autocomplete="off" />
      <div class="sugg" id="sugg-box"></div>
    </div>
    <div class="field">
      <label>วิธีใช้</label>
      <input class="inp" id="med-note" placeholder="เช่น หลังอาหาร 2×/วัน" autocomplete="off" />
    </div>

    <button class="btn-ghost full" onclick="addMed()">+ เพิ่มรายการยา</button>

    <div id="med-list-box"></div>

    <button class="btn-black" onclick="submitOrder()">ส่งคำสั่งยา →</button>

    <hr class="div" />
    <div style="font-size:11px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:8px">ล่าสุด</div>
    <div class="history-scroll" id="order-history">
      <div class="empty"><div class="empty-txt">ยังไม่มีการสั่งยา</div></div>
    </div>
  </div>

  <!-- PANEL 2: PHARMACIST -->
  <div class="panel" style="animation-delay:60ms">
    <div class="panel-title">
      <span class="panel-icon">💊</span>
      เภสัชกร
      <span class="panel-badge" id="ph-badge" style="display:none"></span>
    </div>
    <div id="ph-pending">
      <div class="empty"><div class="empty-icon">☑</div><div class="empty-txt">ไม่มีรายการรอจ่าย</div></div>
    </div>
    <div id="ph-active"></div>
  </div>

  <!-- PANEL 3: QUEUE -->
  <div class="panel" style="animation-delay:120ms">
    <div class="panel-title">
      <span class="panel-icon">🎫</span>
      คิวผู้ป่วย
      <span class="panel-badge" id="q-badge" style="display:none"></span>
    </div>
    <div id="queue-board"></div>
    <div class="queue-scroll" id="queue-list">
      <div class="empty"><div class="empty-icon">🎫</div><div class="empty-txt">ยังไม่มีคิว</div></div>
    </div>
  </div>

  <!-- PANEL 4: DISPENSERS -->
  <div class="panel" style="animation-delay:180ms">
    <div class="panel-title">
      <span class="panel-icon">📦</span>
      ตู้จ่ายยา
    </div>
    <div id="units-wrap"></div>
  </div>

</div>

<script>
  const MEDS = ['Paracetamol 500mg','Amoxicillin 250mg','Ibuprofen 400mg','Cetirizine 10mg','Omeprazole 20mg','Metformin 500mg','Amlodipine 5mg','Atorvastatin 10mg','Simvastatin 20mg','Losartan 50mg'];

  let oid = 1;
  let orders = [];
  let queue  = [];
  let medList = [];
  let dispensers = [
    { id:1, status:'ready', patient:null, meds:[], orderId:null },
    { id:2, status:'ready', patient:null, meds:[], orderId:null },
    { id:3, status:'ready', patient:null, meds:[], orderId:null },
  ];

  /* ── Helpers ── */
  function now() {
    return new Date().toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
  }

  let toastTimer;
  function toast(msg, type='ok') {
    const el = document.getElementById('toast');
    document.getElementById('toast-icon').textContent = type==='err' ? '✕' : type==='info' ? '◉' : '✓';
    document.getElementById('toast-msg').textContent  = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
  }

  /* ── Autocomplete ── */
  const medInput = document.getElementById('med-input');
  const suggBox  = document.getElementById('sugg-box');

  medInput.addEventListener('input', () => {
    const v = medInput.value.trim();
    if (!v) { suggBox.classList.remove('open'); return; }
    const hits = MEDS.filter(s => s.toLowerCase().includes(v.toLowerCase())).slice(0, 5);
    if (!hits.length) { suggBox.classList.remove('open'); return; }
    suggBox.innerHTML = hits.map(s => `<div class="sugg-item" onclick="pickMed('${s}')">${s}</div>`).join('');
    suggBox.classList.add('open');
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#med-input') && !e.target.closest('#sugg-box'))
      suggBox.classList.remove('open');
  });

  function pickMed(s) {
    medInput.value = s;
    suggBox.classList.remove('open');
  }

  /* ── Med list ── */
  function addMed() {
    const name = medInput.value.trim();
    const note = document.getElementById('med-note').value.trim();
    if (!name) return;
    medList.push({ name, note });
    medInput.value = '';
    document.getElementById('med-note').value = '';
    renderMedList();
  }

  function removeMed(i) {
    medList.splice(i, 1);
    renderMedList();
  }

  function renderMedList() {
    const box = document.getElementById('med-list-box');
    if (!medList.length) { box.style.display = 'none'; box.innerHTML = ''; return; }
    box.style.display = 'block';
    box.innerHTML = medList.map((m, i) => `
      <div class="med-row">
        <div class="med-num">${i+1}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.name}</div>
          ${m.note ? `<div style="font-size:11px;color:#aaa">${m.note}</div>` : ''}
        </div>
        <button class="med-del" onclick="removeMed(${i})">✕</button>
      </div>`).join('');
  }

  /* ── Submit order ── */
  function submitOrder() {
    const name = document.getElementById('p-name').value.trim();
    const hn   = document.getElementById('p-hn').value.trim() || `HN-${String(oid).padStart(4,'0')}`;
    if (!name || !medList.length) { toast('กรอกชื่อและรายการยาก่อน', 'err'); return; }
    const o = { id: oid++, patient: name, hn, meds: [...medList], time: now(), status: 'pending' };
    orders.push(o);
    document.getElementById('p-name').value = '';
    document.getElementById('p-hn').value   = '';
    medList = [];
    renderMedList();
    render();
    toast(`ส่งคำสั่งยา — ${o.patient}`);
  }

  /* ── Assign ── */
  function assign(orderId, dId) {
    const o = orders.find(x => x.id === orderId); if (!o) return;
    o.status = 'assigned';
    const d = dispensers.find(x => x.id === dId);
    d.status = 'dispensing'; d.patient = o.patient; d.meds = o.meds; d.orderId = orderId;
    queue.push({ id: o.id, patient: o.patient, hn: o.hn, dispenser: dId, time: now(), status: 'waiting' });
    render();
    toast(`ช่อง ${dId} → ${o.patient}`);
  }

  /* ── Complete ── */
  function complete(dId) {
    const d = dispensers.find(x => x.id === dId);
    const o = orders.find(x => x.id === d.orderId);
    if (o) o.status = 'done';
    queue.filter(q => q.dispenser === dId && q.status === 'waiting').forEach(q => q.status = 'done');
    d.status = 'ready'; d.patient = null; d.meds = []; d.orderId = null;
    render();
    toast(`ช่อง ${dId} จ่ายยาเสร็จ`, 'info');
  }

  /* ── Main render ── */
  function render() {
    const pending  = orders.filter(o => o.status === 'pending');
    const assigned = orders.filter(o => o.status === 'assigned');
    const done     = orders.filter(o => o.status === 'done');
    const activeQ  = queue.filter(q => q.status === 'waiting');

    /* stats */
    document.getElementById('stat-total').textContent   = orders.length;
    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-done').textContent    = done.length;

    /* pharmacy badge */
    const phBadge = document.getElementById('ph-badge');
    if (pending.length) { phBadge.textContent = pending.length; phBadge.style.display = 'inline'; }
    else phBadge.style.display = 'none';

    /* queue badge */
    const qBadge = document.getElementById('q-badge');
    if (activeQ.length) { qBadge.textContent = activeQ.length; qBadge.style.display = 'inline'; }
    else qBadge.style.display = 'none';

    /* ── order history ── */
    document.getElementById('order-history').innerHTML = !orders.length
      ? `<div class="empty"><div class="empty-txt">ยังไม่มีการสั่งยา</div></div>`
      : [...orders].reverse().map(o => `
        <div class="h-row">
          <div style="flex:1;min-width:0">
            <div class="h-name">${o.patient}</div>
            <div class="h-sub">${o.hn} · ${o.time}</div>
          </div>
          <span class="tag tag-${o.status==='pending'?'p':o.status==='assigned'?'a':'d'}">
            ${o.status==='pending'?'รอ':o.status==='assigned'?'จ่าย':'✓'}
          </span>
        </div>`).join('');

    /* ── pharmacist pending ── */
    document.getElementById('ph-pending').innerHTML = !pending.length
      ? `<div class="empty"><div class="empty-icon">☑</div><div class="empty-txt">ไม่มีรายการรอจ่าย</div></div>`
      : pending.map(o => `
        <div class="rx-card">
          <div class="rx-top">
            <div>
              <div class="rx-name">${o.patient}</div>
              <div class="rx-meta">${o.hn} · ${o.time}</div>
            </div>
            <span class="tag tag-p">รอจ่าย</span>
          </div>
          <div class="rx-meds">
            ${o.meds.map(m => `
              <div class="rx-med-row">
                <strong style="color:#111">${m.name}</strong>
                ${m.note ? `<span style="color:#aaa"> — ${m.note}</span>` : ''}
              </div>`).join('')}
          </div>
          <div style="font-size:11px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px">กำหนดช่อง</div>
          <div class="assign-btns">
            ${dispensers.map(d => `
              <button class="btn-ghost" ${d.status!=='ready'?'disabled':''} onclick="assign(${o.id},${d.id})">
                ${d.status==='ready' ? `ช่อง ${d.id}` : `🔒 ${d.id}`}
              </button>`).join('')}
          </div>
        </div>`).join('');

    /* ── pharmacist active ── */
    document.getElementById('ph-active').innerHTML = !assigned.length ? '' : `
      <div class="in-progress">
        <div class="in-progress-lbl">กำลังจ่าย</div>
        ${assigned.map(o => `
          <div class="ip-row">
            <div class="dot dot-yellow"></div>
            <span style="font-size:13px;font-weight:600;color:#111;flex:1">${o.patient}</span>
            <span class="tag tag-a">กำลังจ่าย</span>
          </div>`).join('')}
      </div>`;

    /* ── queue board ── */
    document.getElementById('queue-board').innerHTML = !activeQ.length ? '' : `
      <div class="queue-board">
        <div class="queue-board-lbl">กรุณาไปรับยาที่</div>
        <div class="queue-tickets">
          ${activeQ.map(q => `
            <div class="queue-ticket">
              <div class="ticket-num">0${q.dispenser}</div>
              <div class="ticket-name">${q.patient}</div>
            </div>`).join('')}
        </div>
      </div>`;

    /* ── queue list ── */
    document.getElementById('queue-list').innerHTML = !queue.length
      ? `<div class="empty"><div class="empty-icon">🎫</div><div class="empty-txt">ยังไม่มีคิว</div></div>`
      : [...queue].reverse().map(q => `
        <div class="qrow ${q.status}">
          <div class="q-id ${q.status}">${q.status==='done'?'✓':q.id}</div>
          <div style="flex:1;min-width:0">
            <div class="q-name">${q.patient}</div>
            <div class="q-sub">${q.hn} · ${q.time}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div class="q-unit ${q.status}">ช่อง ${q.dispenser}</div>
            <span class="tag ${q.status==='waiting'?'tag-p':'tag-d'}" style="font-size:10px">
              ${q.status==='waiting'?'รอรับ':'✓ รับแล้ว'}
            </span>
          </div>
        </div>`).join('');

    /* ── dispensers ── */
    document.getElementById('units-wrap').innerHTML = dispensers.map(d => `
      <div class="disp ${d.status==='ready'?'idle':'busy'}">
        <div class="disp-top">
          <div class="disp-unit-lbl" style="color:${d.status==='ready'?'#bbb':'rgba(255,255,255,0.35)'}">UNIT</div>
          <div class="disp-status">
            <div class="dot ${d.status==='ready'?'dot-green':'dot-yellow'}"></div>
            <span class="disp-status-txt" style="color:${d.status==='ready'?'#22c55e':'#f59e0b'}">
              ${d.status==='ready'?'READY':'ACTIVE'}
            </span>
          </div>
        </div>
        <div class="disp-num ${d.status==='ready'?'idle':'busy'}">0${d.id}</div>
        ${d.status==='ready'
          ? `<div class="disp-ready-txt">พร้อมรับยา</div>`
          : `<div class="disp-patient">${d.patient}</div>
             <div>${d.meds.map(m=>`<div class="disp-med">${m.name}</div>`).join('')}</div>
             <button class="btn-complete" onclick="complete(${d.id})">จ่ายยาแล้ว ✓</button>`
        }
      </div>`).join('');
  }

  render();
</script>
</body>
</html>
